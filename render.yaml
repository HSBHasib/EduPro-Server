services:
  - type: web
    name: edupro-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false